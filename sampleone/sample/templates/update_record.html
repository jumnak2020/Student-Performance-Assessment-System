<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Student Record</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .hidden {
            display: none;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body style="background-color: #f4f4f9; margin: 0; padding: 20px;">
    <div style="max-width: 800px; margin: 0 auto;">
        
        <nav class="navbar">
            <h3>Student Performance Assessment System</h3>
            <div class="navbar-links">
                <a href="{{ url_for('dashboard') }}" class="nav-link">Dashboard</a>
                <a href="{{ url_for('view_results') }}" class="nav-link">View Results</a>
                <a href="{{ url_for('history') }}" class="nav-link">History</a>
                <a href="{{ url_for('student_graph') }}" class="nav-link">Graphs</a>
                {% if session.role != 'Student' %}
                    <a href="{{ url_for('model_comparison') }}" class="nav-link">Model Comparison</a>
                {% endif %}
                <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
            </div>
        </nav>

        <h2 style="text-align: center; color: #2c7be5;">Update Student Record</h2>

        <form method="POST" style="background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);">
            
            <label for="institution_type">Institution Type:</label>
            <select name="institution_type" id="institution_type" required onchange="toggleFields()">
                <option value="school" {% if record.institution_type|lower == 'school' %}selected{% endif %}>School</option>
                <option value="college" {% if record.institution_type|lower == 'college' %}selected{% endif %}>College</option>
            </select>

            <!-- SCHOOL FIELDS -->
            <div id="school-fields">
                <label for="marks">Previous Term Percentage:</label>
                <input type="number" step="0.01" name="marks" id="marks" value="{{ record.marks if record.marks else '' }}" min="0" max="100">

                <label for="class_grade">Class / Grade:</label>
                <select name="class_grade" id="class_grade">
                    <option value="">Select Class</option>
                    <option value="8" {% if record.class_grade == '8' %}selected{% endif %}>Class 8</option>
                    <option value="9" {% if record.class_grade == '9' %}selected{% endif %}>Class 9</option>
                    <option value="10" {% if record.class_grade == '10' %}selected{% endif %}>Class 10</option>
                    <option value="11" {% if record.class_grade == '11' %}selected{% endif %}>Class 11</option>
                    <option value="12" {% if record.class_grade == '12' %}selected{% endif %}>Class 12</option>
                </select>
            </div>

            <!-- COLLEGE FIELDS -->
            <div id="college-fields">
                <label for="prior_gpa">Prior GPA / CGPA:</label>
                <input type="number" step="0.01" name="prior_gpa" id="prior_gpa" value="{{ record.prior_gpa if record.prior_gpa else '' }}" min="0" max="10">

                <label for="semester">Semester:</label>
                <select name="semester" id="semester">
                    <option value="">Select Semester</option>
                    <option value="1" {% if record.student_semester == '1' %}selected{% endif %}>Semester 1</option>
                    <option value="2" {% if record.student_semester == '2' %}selected{% endif %}>Semester 2</option>
                    <option value="3" {% if record.student_semester == '3' %}selected{% endif %}>Semester 3</option>
                    <option value="4" {% if record.student_semester == '4' %}selected{% endif %}>Semester 4</option>
                    <option value="5" {% if record.student_semester == '5' %}selected{% endif %}>Semester 5</option>
                    <option value="6" {% if record.student_semester == '6' %}selected{% endif %}>Semester 6</option>
                    <option value="7" {% if record.student_semester == '7' %}selected{% endif %}>Semester 7</option>
                    <option value="8" {% if record.student_semester == '8' %}selected{% endif %}>Semester 8</option>
                </select>
            </div>

            <!-- COMMON FIELDS -->
            <label for="attendance">Attendance Percentage:</label>
            <input type="number" step="0.01" name="attendance" id="attendance" value="{{ record.attendance_percentage }}" required min="0" max="100">

            <button type="submit" style="width: 100%; padding: 10px; background: #2c7be5; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;">Update Record</button>
        </form>
    </div>

    <script>
        function toggleFields() {
            const institutionType = document.getElementById('institution_type').value;
            const schoolFields = document.getElementById('school-fields');
            const collegeFields = document.getElementById('college-fields');
            
            if (institutionType === 'school') {
                schoolFields.style.display = 'block';
                collegeFields.style.display = 'none';
                // Make school fields required
                document.getElementById('marks').required = true;
                document.getElementById('class_grade').required = true;
                // Make college fields not required
                document.getElementById('prior_gpa').required = false;
                document.getElementById('semester').required = false;
            } else {
                schoolFields.style.display = 'none';
                collegeFields.style.display = 'block';
                // Make college fields required
                document.getElementById('prior_gpa').required = true;
                document.getElementById('semester').required = true;
                // Make school fields not required
                document.getElementById('marks').required = false;
                document.getElementById('class_grade').required = false;
            }
        }
        
        // Run on page load to set initial state
        document.addEventListener('DOMContentLoaded', function() {
            toggleFields();
        });
    </script>
</body>
</html>
